<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f4c3a;
      display: flex;
      justify-content: center;
      align-items: flex start;
      padding-top: 50px;
      height: 100vh;
    }

    .card {
      background: #155e4a;
      padding: 25px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      color: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .top-btn {
      background: #1b7a5c;
      padding: 8px 15px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .profile {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin: 0 auto 15px;
      background: url('photo.jpeg') center/cover;
    }

    h1 {
      margin: 10px 0;
      font-size: 26px;
      letter-spacing: 2px;
    }

    .active-box {
      background: linear-gradient(90deg, #38f1c3, #224d42);
      padding: 10px;
      border-radius: 15px;
      margin: 15px 0;
    }

    .count {
      font-size: 27px;
      font-weight: bold;
    }

    .redirect {
      margin: 20px 0;
      background: #0d3f31;
      padding: 10px;
      border-radius: 15px;
    }

    .redirect span {
      color: #feca57;
      font-weight: bold;
      font-size: 20px;
    }

    .join-btn {
      display: block;
      background: linear-gradient(90deg, #0091b6, #01a3a4);
      padding: 15px;
      border-radius: 15px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      margin: 15px 0;
      transition: 0.3s;
    }

    .join-btn:hover {
      transform: scale(1.05);
    }

    .footer {
      font-size: 13px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top-btn">Join Official Telegram Channel</div>

    <div class="profile"></div>

    <h1>ASHOK CHOUDHARY</h1>

    <div class="active-box">
      <div class="count">15,816</div>
      <div>Active Now</div>
    </div>

    <div class="redirect">
      Redirect In <span id="timer">60</span>
    </div>

    <a href="https://t.me/+_lTXhQXN1io4NTI1" class="join-btn">JOIN TELEGRAM CHANNEL</a>

    <div class="footer">
      Honest analysis, Daily match insights <br>
      Join now our Telegram Community Never Miss Any Update...
    </div>
  </div>

  <script>
    let time = 55;
    const timer = document.getElementById('timer');

    setInterval(() => {
      time--;
      timer.innerText = time;
      if(time <= 0) {
        window.location.href = "https://t.me/+_lTXhQXN1io4NTI1";
      }
    }, 1000);
  </script>

</body>
</html>
